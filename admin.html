<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>RIBA TECH — لوحة التحكم</title>

    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --grad: linear-gradient(135deg, hsl(268,85%,60%), hsl(201,95%,55%));
            --bg: #06070B;
            --card: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.09);
            --txt: #E2E8F0;
            --muted: #94A3B8;
            --bright: #fff;
            --accent: hsl(201,95%,60%);
            --danger: #EF4444;
            --green: #10B981;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--txt); font-family:'Cairo',sans-serif; min-height:100vh; }
        a { color:var(--accent); }
        .hidden { display:none !important; }

        /* Login */
        .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .login-box { background:rgba(16,17,24,0.9); border:1px solid var(--border); border-radius:20px; padding:40px 32px; width:100%; max-width:400px; }
        .login-logo { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:8px; }
        .login-logo img { width:40px; height:40px; }
        .login-logo span { font-family:'Outfit',sans-serif; font-weight:800; font-size:1.4rem; color:var(--bright); letter-spacing:1px; }
        .login-sub { text-align:center; color:var(--muted); font-size:0.85rem; margin-bottom:28px; }
        .field { margin-bottom:16px; }
        .field label { display:block; font-size:0.82rem; color:var(--muted); margin-bottom:6px; font-weight:600; }
        .field input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:9px; padding:12px 14px; color:var(--bright); font-family:inherit; font-size:0.95rem; outline:none; transition:.2s; }
        .field input:focus { border-color:var(--accent); background:rgba(255,255,255,0.07); }
        .btn { width:100%; background:var(--grad); color:#fff; border:none; border-radius:9px; padding:13px; font-family:inherit; font-weight:700; font-size:0.98rem; cursor:pointer; transition:.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
        .btn:disabled { opacity:.6; cursor:not-allowed; }
        .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); margin-top:12px; }
        .msg { font-size:0.85rem; text-align:center; margin-top:14px; min-height:20px; }
        .msg.err { color:var(--danger); }
        .msg.ok { color:var(--green); }

        /* Dashboard */
        .topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); background:rgba(16,17,24,0.6); position:sticky; top:0; z-index:10; backdrop-filter:blur(10px); }
        .topbar .brand { display:flex; align-items:center; gap:10px; font-family:'Outfit',sans-serif; font-weight:700; color:var(--bright); }
        .topbar .brand img { width:32px; height:32px; }
        .who { font-size:0.8rem; color:var(--muted); }
        .logout { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); color:var(--danger); border-radius:8px; padding:8px 14px; cursor:pointer; font-family:inherit; font-size:0.85rem; font-weight:600; }
        .logout:hover { background:rgba(239,68,68,0.2); }

        .tabs { display:flex; gap:4px; padding:16px 24px 0; flex-wrap:wrap; }
        .tab { background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); font-family:inherit; font-weight:700; font-size:0.92rem; padding:10px 16px; cursor:pointer; display:flex; align-items:center; gap:8px; }
        .tab.active { color:var(--bright); border-bottom-color:var(--accent); }
        .tab .count { background:rgba(255,255,255,0.1); border-radius:20px; font-size:0.72rem; padding:1px 8px; }

        .panel { padding:24px; max-width:1100px; margin:0 auto; }
        .panel.hidden { display:none; }
        .toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
        .toolbar h2 { font-size:1.15rem; color:var(--bright); }
        .refresh { background:var(--card); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:8px 14px; cursor:pointer; font-family:inherit; font-size:0.82rem; }
        .refresh:hover { color:var(--bright); }

        .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:14px; }
        .card-head { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px; flex-wrap:wrap; }
        .card-name { font-weight:700; color:var(--bright); display:flex; align-items:center; gap:8px; }
        .card-time { font-size:0.72rem; color:var(--muted); }
        .card-row { font-size:0.88rem; color:var(--muted); margin-bottom:5px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .card-row i { width:16px; color:var(--accent); }
        .card-row a { text-decoration:none; }
        .subject { color:var(--accent); font-weight:600; }
        .body-box { margin-top:10px; background:rgba(0,0,0,0.25); border-radius:8px; padding:10px 14px; border-right:2px solid var(--border); color:var(--txt); font-size:0.86rem; line-height:1.6; white-space:pre-wrap; }
        .pill { display:inline-block; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:20px; padding:2px 10px; font-size:0.75rem; color:var(--txt); }
        .price { color:var(--green); font-weight:700; }
        .empty { text-align:center; padding:60px 20px; color:var(--muted); }
        .empty i { font-size:2.5rem; opacity:.4; display:block; margin-bottom:12px; }

        /* Team */
        .team-add { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
        .team-add input { flex:1; min-width:200px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:9px; padding:11px 14px; color:var(--bright); font-family:inherit; outline:none; }
        .team-add input:focus { border-color:var(--accent); }
        .team-add button { background:var(--grad); color:#fff; border:none; border-radius:9px; padding:0 22px; font-family:inherit; font-weight:700; cursor:pointer; }
        .team-hint { font-size:0.8rem; color:var(--muted); background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:20px; line-height:1.6; }
        .member { display:flex; align-items:center; justify-content:space-between; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:10px; }
        .member .info { display:flex; align-items:center; gap:10px; }
        .member .av { width:34px; height:34px; border-radius:50%; background:var(--grad); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; text-transform:uppercase; }
        .member .em { color:var(--bright); font-size:0.9rem; }
        .member .role { font-size:0.72rem; color:var(--muted); }
        .remove { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:var(--danger); border-radius:7px; padding:7px 12px; cursor:pointer; font-family:inherit; font-size:0.8rem; }
        .remove:hover { background:rgba(239,68,68,0.2); }
        .badge-owner { background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3); color:var(--green); border-radius:20px; padding:2px 10px; font-size:0.72rem; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div class="login-wrap" id="login-view">
        <div class="login-box">
            <div class="login-logo">
                <img src="assets/logo.svg" alt="RIBA">
                <span>RIBA<span style="color:var(--accent)">TECH</span></span>
            </div>
            <p class="login-sub">لوحة التحكم — الدخول للمصرّح لهم فقط</p>
            <div class="field">
                <label>البريد الإلكتروني</label>
                <input type="email" id="login-email" placeholder="you@example.com" autocomplete="username">
            </div>
            <div class="field">
                <label>كلمة المرور</label>
                <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn" id="btn-login"><i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول</button>
            <button class="btn btn-ghost" id="btn-signup">إنشاء حساب جديد (للفريق)</button>
            <div class="msg" id="login-msg"></div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dash-view" class="hidden">
        <div class="topbar">
            <div class="brand"><img src="assets/logo.svg" alt="RIBA"> لوحة التحكم</div>
            <div style="display:flex; align-items:center; gap:14px;">
                <span class="who" id="who"></span>
                <button class="logout" id="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> خروج</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="messages"><i class="fa-solid fa-envelope"></i> الرسائل <span class="count" id="count-messages">0</span></button>
            <button class="tab" data-tab="leads"><i class="fa-solid fa-calculator"></i> طلبات التسعير <span class="count" id="count-leads">0</span></button>
            <button class="tab" data-tab="team"><i class="fa-solid fa-users"></i> الفريق والصلاحيات</button>
        </div>

        <div class="panel" id="panel-messages">
            <div class="toolbar"><h2>رسائل التواصل</h2><button class="refresh" onclick="loadMessages()"><i class="fa-solid fa-rotate"></i> تحديث</button></div>
            <div id="messages-list"></div>
        </div>

        <div class="panel hidden" id="panel-leads">
            <div class="toolbar"><h2>طلبات تقدير التكلفة</h2><button class="refresh" onclick="loadLeads()"><i class="fa-solid fa-rotate"></i> تحديث</button></div>
            <div id="leads-list"></div>
        </div>

        <div class="panel hidden" id="panel-team">
            <div class="toolbar"><h2>إدارة الصلاحيات</h2><button class="refresh" onclick="loadTeam()"><i class="fa-solid fa-rotate"></i> تحديث</button></div>
            <div class="team-hint">
                <i class="fa-solid fa-circle-info" style="color:var(--accent)"></i>
                أضف بريد زميلك هنا ليصبح مصرّحاً له. بعدها يفتح هذه الصفحة ويضغط <strong>"إنشاء حساب جديد"</strong> بنفس البريد ليدخل ويشاهد البيانات. لإلغاء صلاحيته، احذفه من القائمة.
            </div>
            <div class="team-add">
                <input type="email" id="team-email" placeholder="teammate@example.com">
                <button id="btn-add-member"><i class="fa-solid fa-plus"></i> إضافة</button>
            </div>
            <div class="msg" id="team-msg" style="text-align:right"></div>
            <div id="team-list"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://scqnljrwegyouqszwfiy.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_dyE5_6AL46G6VauBbzhZ1Q_R1rLp-MF';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const $ = id => document.getElementById(id);
        const esc = s => (s == null ? '' : String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])));
        const fmtDate = s => { try { return new Date(s).toLocaleString('ar-EG', {dateStyle:'medium', timeStyle:'short'}); } catch(e){ return s; } };

        let currentEmail = '';

        /* ---------- AUTH ---------- */
        async function doLogin() {
            const email = $('login-email').value.trim();
            const pass = $('login-pass').value;
            if (!email || !pass) return setMsg('login-msg','أدخل البريد وكلمة المرور','err');
            $('btn-login').disabled = true;
            const { error } = await sb.auth.signInWithPassword({ email, password: pass });
            $('btn-login').disabled = false;
            if (error) return setMsg('login-msg', 'فشل الدخول: ' + error.message, 'err');
            checkSession();
        }

        async function doSignup() {
            const email = $('login-email').value.trim();
            const pass = $('login-pass').value;
            if (!email || pass.length < 6) return setMsg('login-msg','أدخل بريداً وكلمة مرور (6 أحرف على الأقل)','err');
            $('btn-signup').disabled = true;
            const { data, error } = await sb.auth.signUp({ email, password: pass });
            $('btn-signup').disabled = false;
            if (error) return setMsg('login-msg', 'تعذّر الإنشاء: ' + error.message, 'err');
            if (data.session) { checkSession(); }
            else { setMsg('login-msg','تم إنشاء الحساب! تحقق من بريدك لتأكيد الحساب ثم سجّل الدخول.','ok'); }
        }

        async function doLogout() {
            await sb.auth.signOut();
            location.reload();
        }

        async function checkSession() {
            const { data:{ session } } = await sb.auth.getSession();
            if (!session) { showLogin(); return; }
            currentEmail = session.user.email;
            // Verify this user is an allowed admin by attempting a gated read
            const { error } = await sb.from('admins').select('email').limit(1);
            if (error) {
                setMsg('login-msg','هذا الحساب غير مصرّح له بعد. تواصل مع المسؤول لإضافة بريدك.','err');
                await sb.auth.signOut();
                showLogin();
                return;
            }
            showDash();
        }

        function setMsg(id, text, cls) { const el=$(id); el.textContent=text; el.className='msg'+(cls?' '+cls:''); }
        function showLogin() { $('login-view').classList.remove('hidden'); $('dash-view').classList.add('hidden'); }
        function showDash() {
            $('login-view').classList.add('hidden');
            $('dash-view').classList.remove('hidden');
            $('who').textContent = currentEmail;
            loadMessages(); loadLeads(); loadTeam();
        }

        /* ---------- DATA ---------- */
        async function loadMessages() {
            const { data, error } = await sb.from('contact_messages').select('*').order('created_at',{ascending:false});
            const box = $('messages-list');
            if (error) { box.innerHTML = errBox(error.message); return; }
            $('count-messages').textContent = data.length;
            if (!data.length) { box.innerHTML = emptyBox('fa-envelope-open','لا توجد رسائل بعد'); return; }
            box.innerHTML = data.map(m => `
                <div class="card">
                    <div class="card-head">
                        <div class="card-name"><i class="fa-solid fa-user" style="color:var(--accent)"></i> ${esc(m.name)}</div>
                        <div class="card-time">${fmtDate(m.created_at)}</div>
                    </div>
                    <div class="card-row"><i class="fa-solid fa-envelope"></i> <a href="mailto:${esc(m.email)}">${esc(m.email)}</a></div>
                    ${m.phone ? `<div class="card-row"><i class="fa-brands fa-whatsapp"></i> <a href="https://wa.me/${esc((m.phone||'').replace(/\D/g,''))}" target="_blank">${esc(m.phone)}</a></div>` : ''}
                    <div class="card-row"><i class="fa-solid fa-tag"></i> <span class="subject">${esc(m.subject)}</span></div>
                    <div class="body-box">${esc(m.message)}</div>
                </div>`).join('');
        }

        async function loadLeads() {
            const { data, error } = await sb.from('project_leads').select('*').order('created_at',{ascending:false});
            const box = $('leads-list');
            if (error) { box.innerHTML = errBox(error.message); return; }
            $('count-leads').textContent = data.length;
            if (!data.length) { box.innerHTML = emptyBox('fa-calculator','لا توجد طلبات تسعير بعد'); return; }
            const typeAr = { web:'تطبيق ويب', ecommerce:'متجر إلكتروني', mobile:'تطبيق جوال', brokerage:'فينتك' };
            box.innerHTML = data.map(l => `
                <div class="card">
                    <div class="card-head">
                        <div class="card-name"><i class="fa-solid fa-cube" style="color:var(--accent)"></i> ${esc(typeAr[l.project_type]||l.project_type)}</div>
                        <div class="card-time">${fmtDate(l.created_at)}</div>
                    </div>
                    <div class="card-row"><i class="fa-solid fa-money-bill"></i> <span class="price">$${(l.estimated_price||0).toLocaleString()}</span></div>
                    <div class="card-row"><i class="fa-solid fa-layer-group"></i> ${esc(l.pages)} صفحة/شاشة</div>
                    <div class="card-row"><i class="fa-solid fa-clock"></i> ${esc(l.timeline||'—')}</div>
                    ${l.features ? `<div class="card-row"><i class="fa-solid fa-puzzle-piece"></i> ${esc(l.features).split(',').filter(Boolean).map(f=>`<span class="pill">${esc(f)}</span>`).join(' ')}</div>` : ''}
                </div>`).join('');
        }

        async function loadTeam() {
            const { data, error } = await sb.from('admins').select('*').order('created_at',{ascending:true});
            const box = $('team-list');
            if (error) { box.innerHTML = errBox(error.message); return; }
            box.innerHTML = data.map(a => {
                const isOwner = a.role === 'owner';
                const isSelf = a.email.toLowerCase() === currentEmail.toLowerCase();
                return `
                <div class="member">
                    <div class="info">
                        <div class="av">${esc(a.email[0])}</div>
                        <div>
                            <div class="em">${esc(a.email)} ${isSelf?'<span class="role">(أنت)</span>':''}</div>
                            <div class="role">${isOwner?'<span class="badge-owner">المالك</span>':'عضو'}</div>
                        </div>
                    </div>
                    ${(isOwner||isSelf) ? '' : `<button class="remove" onclick="removeMember('${esc(a.email)}')"><i class="fa-solid fa-trash"></i> إزالة</button>`}
                </div>`;
            }).join('');
        }

        async function addMember() {
            const email = $('team-email').value.trim().toLowerCase();
            if (!email || !email.includes('@')) return setMsg('team-msg','أدخل بريداً صحيحاً','err');
            const { error } = await sb.from('admins').insert({ email, role:'member', added_by: currentEmail });
            if (error) return setMsg('team-msg','تعذّرت الإضافة: '+error.message,'err');
            $('team-email').value = '';
            setMsg('team-msg','تمت إضافة '+email+' بنجاح','ok');
            loadTeam();
        }

        async function removeMember(email) {
            if (!confirm('إزالة صلاحية '+email+'؟')) return;
            const { error } = await sb.from('admins').delete().eq('email', email);
            if (error) return setMsg('team-msg','تعذّر الحذف: '+error.message,'err');
            loadTeam();
        }

        function emptyBox(icon,text){ return `<div class="empty"><i class="fa-solid ${icon}"></i>${text}</div>`; }
        function errBox(m){ return `<div class="empty"><i class="fa-solid fa-triangle-exclamation"></i>خطأ: ${esc(m)}</div>`; }

        /* ---------- TABS ---------- */
        document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
            t.classList.add('active');
            ['messages','leads','team'].forEach(p => $('panel-'+p).classList.toggle('hidden', p !== t.dataset.tab));
        }));

        $('btn-login').addEventListener('click', doLogin);
        $('btn-signup').addEventListener('click', doSignup);
        $('btn-logout').addEventListener('click', doLogout);
        $('btn-add-member').addEventListener('click', addMember);
        $('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

        checkSession();
    </script>
</body>
</html>
